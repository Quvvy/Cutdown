[package]
name = "cutdown"
version = "0.1.0"
description = "Fast desktop video clipping and compression tool."
authors = ["Cutdown"]
edition = "2021"
license = ""
repository = ""

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = ["protocol-asset", "tray-icon"] }
tauri-plugin-dialog = "2"

